papersearch_llm_summary: "该论文对多种大型语言模型（LLM）在漏洞检测任务上的表现进行了系统比较评估，涵盖从较小模型到超大规模模型（如GPT-4、Llama等）。研究在多个基准数据集上测试了不同模型在真实世界漏洞检测中的准确率、召回率和误报率。结果表明，模型规模与检测性能并非严格正相关，某些中等规模模型在特定场景下表现优于超大模型。论文还分析了模型对代码上下文的理解能力、对漏洞类型的敏感性以及误报模式。研究为LLM在软件安全漏洞检测中的应用提供了实证参考，但未提出新的检测方法或工具。"
