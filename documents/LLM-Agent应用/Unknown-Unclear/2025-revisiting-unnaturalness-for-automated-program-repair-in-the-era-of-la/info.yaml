papersearch_llm_summary: "该论文重新审视了自动程序修复中“不自然性”的概念，特别是在大语言模型时代。作者探讨了传统基于n-gram的“不自然性”度量在LLM修复场景下的有效性，并提出了新的视角。研究发现，LLM生成的补丁往往更“自然”，但自然性并不总是与正确性相关。论文通过实验分析了不同修复方法（包括基于LLM的方法）的补丁自然性特征，为理解LLM在程序修复中的行为提供了新见解。该工作对改进自动修复技术、尤其是结合LLM的修复策略具有指导意义。"
