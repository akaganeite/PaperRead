title: 'Attacking the First-Principle: A Black-Box Query-Free Targeted Mimicry Attack
  on Binary Function Classifiers'
type: misc
url: https://arxiv.org/abs/2605.18231v1
year: 2026
abstract: "Machine-learning-based binary function classifiers are increasingly used to detect vulnerabilities, malicious code, and unauthorized modifications in software systems, but remain vulnerable to adversarial manipulation. The paper introduces Kelpie, a black-box, zero-query targeted mimicry attack framework against binary function classifiers. Kelpie applies semantics-preserving code transformations that keep the payload functional while making it resemble a chosen target function through control-flow mimicry and instruction-distribution alignment. The authors evaluate Kelpie across eight state-of-the-art classifiers and show targeted mimicry in classification and retrieval settings, including case studies on hiding vulnerable functions and malicious payloads."
